name: quick-review
description: Streamlined product review — fetches data, analyzes reviews, writes article, scores quality (no comparison research)
version: "1.0"

input:
  product_id:
    type: number
    required: true

steps:
  - id: fetch
    agent: product-fetcher
    input:
      product_id: $.input.product_id
    next:
      if: output.found
      then: review_analysis
      else: _end

  - id: review_analysis
    agent: review-analyzer
    input:
      product_name: $.steps.fetch.output.title
      category: $.steps.fetch.output.category
      price: $.steps.fetch.output.price
      rating: $.steps.fetch.output.rating
      reviews_text: $.steps.fetch.output.reviews_text
    retry:
      max_attempts: 2
      backoff_ms: 500
    fallback:
      agent: review-analyzer
      config:
        model: gpt-4.1-mini

  - id: article
    agent: review-writer
    input:
      product_name: $.steps.fetch.output.title
      brand: $.steps.fetch.output.brand
      price: $.steps.fetch.output.price
      review_analysis: $.steps.review_analysis.output
      comparison_report: {}
    retry:
      max_attempts: 3
      backoff_ms: 1000
    fallback:
      agent: review-writer
      config:
        model: gpt-4.1-mini

  - id: quality
    agent: quality-scorer
    input:
      review_article: $.steps.article.output
      review_analysis: $.steps.review_analysis.output
      comparison_report: {}

output:
  product: $.steps.fetch.output
  review_analysis: $.steps.review_analysis.output
  article: $.steps.article.output
  quality_scores: $.steps.quality.output
